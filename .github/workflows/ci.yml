name: CI REV

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven verify
        run: mvn -B verify -DskipITs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/rev-dashboard/package-lock.json
      - name: Frontend build
        run: |
          cd frontend/rev-dashboard
          npm ci
          npm run build
