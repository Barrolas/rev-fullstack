server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: bff_route
              uri: lb://BFF-REV
              predicates:
                - Path=/api/**
              filters:
                - AuthenticationFilter
            - id: auth_route
              uri: lb://KEYCLOAK-ADAPTER
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: INFO
