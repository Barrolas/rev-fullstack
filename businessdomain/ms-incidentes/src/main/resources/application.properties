spring.application.name=MS-INCIDENTES
server.port=8081

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://${POSTGRES_INCIDENTES_HOST:localhost}:${POSTGRES_INCIDENTES_PORT:5432}/${POSTGRES_INCIDENTES_DB:rev_incidentes}
spring.datasource.username=${POSTGRES_INCIDENTES_USER:rev}
spring.datasource.password=${POSTGRES_INCIDENTES_PASSWORD:rev123}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
