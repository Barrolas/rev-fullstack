name: rev

x-java-app: &java-app
  image: eclipse-temurin:21-jre-alpine
  restart: on-failure
  environment:
    SPRING_PROFILES_ACTIVE: docker
  command: ["java", "-jar", "/opt/app.jar"]

services:
  postgres-incidentes:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rev_incidentes
      POSTGRES_USER: rev
      POSTGRES_PASSWORD: rev123
    ports:
      - "${REV_PG_INCIDENTES_PORT:-15432}:5432"
    volumes:
      - pg_incidentes:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rev -d rev_incidentes"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres-zonas:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: rev_zonas
      POSTGRES_USER: rev
      POSTGRES_PASSWORD: rev123
    ports:
      - "${REV_PG_ZONAS_PORT:-15433}:5432"
    volumes:
      - pg_zonas:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rev -d rev_zonas"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres-recursos:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rev_recursos
      POSTGRES_USER: rev
      POSTGRES_PASSWORD: rev123
    ports:
      - "${REV_PG_RECURSOS_PORT:-15434}:5432"
    volumes:
      - pg_recursos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rev -d rev_recursos"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "${REV_KEYCLOAK_PORT:-18090}:8080"
    volumes:
      - ./docker/keycloak/rev-realm.json:/opt/keycloak/data/import/rev-realm.json

  # Perfil apps: microservicios Spring (requiere JARs en target/ — ver scripts/dev-up.ps1 -DockerApps)
  eureka-server:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-eureka
    hostname: rev-eureka
    ports:
      - "${REV_EUREKA_PORT:-18761}:8761"
    volumes:
      - ./infraestructuredomain/eureka-server/target/eureka-server-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro

  spring-boot-admin:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-spring-boot-admin
    ports:
      - "${REV_SBA_PORT:-18099}:8099"
    volumes:
      - ./infraestructuredomain/spring-boot-admin/target/spring-boot-admin-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      eureka-server:
        condition: service_started

  ms-incidentes:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-ms-incidentes
    ports:
      - "${REV_MS_INCIDENTES_PORT:-18081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REV_STORAGE_PATH: /data/incidente-adjuntos
    volumes:
      - ./businessdomain/ms-incidentes/target/ms-incidentes-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
      - rev_incidente_media:/data/incidente-adjuntos
    depends_on:
      postgres-incidentes:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-zonas-riesgo:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-ms-zonas
    ports:
      - "${REV_MS_ZONAS_PORT:-18082}:8082"
    volumes:
      - ./businessdomain/ms-zonas-riesgo/target/ms-zonas-riesgo-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      postgres-zonas:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-recursos:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-ms-recursos
    ports:
      - "${REV_MS_RECURSOS_PORT:-18083}:8083"
    volumes:
      - ./businessdomain/ms-recursos/target/ms-recursos-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      postgres-recursos:
        condition: service_healthy
      eureka-server:
        condition: service_started

  bff-rev:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-bff
    ports:
      - "${REV_BFF_PORT:-18085}:8085"
    volumes:
      - ./infraestructuredomain/bff-rev/target/bff-rev-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      eureka-server:
        condition: service_started
      ms-incidentes:
        condition: service_started
      ms-zonas-riesgo:
        condition: service_started
      ms-recursos:
        condition: service_started

  keycloak-adapter:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-keycloak-adapter
    ports:
      - "${REV_KEYCLOAK_ADAPTER_PORT:-18088}:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ./infraestructuredomain/keycloak-adapter/target/keycloak-adapter-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      eureka-server:
        condition: service_started
      keycloak:
        condition: service_started

  api-gateway:
    <<: *java-app
    profiles: ["apps"]
    container_name: rev-api-gateway
    ports:
      - "${REV_GATEWAY_PORT:-18080}:8080"
    volumes:
      - ./infraestructuredomain/api-gateway/target/api-gateway-${REV_VERSION:-1.0-SNAPSHOT}.jar:/opt/app.jar:ro
    depends_on:
      eureka-server:
        condition: service_started
      bff-rev:
        condition: service_started
      keycloak-adapter:
        condition: service_started

volumes:
  pg_incidentes:
  pg_zonas:
  pg_recursos:
  rev_incidente_media:
